name: etcd Releases

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional custom release tag to build (if empty, use latest)"
        required: false
        default: ""

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  check-release:
    runs-on: ubuntu-latest
    outputs:
      has_new: ${{ steps.check.outputs.has_new }}
      new_releases: ${{ steps.check.outputs.new_releases }}
      all_releases: ${{ steps.check.outputs.all_releases }}
      latest_tag: ${{ steps.check.outputs.latest_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch and check releases
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UPSTREAM_REPO: etcd-io/etcd
          SINGLE_SUITE: "true"
          SUITE_NAME: etcd
          FORCE_TAG: ${{ github.event.inputs.release_tag }}
          ALWAYS_BUILD: ${{ github.event_name == 'workflow_dispatch' }}
        run: bash scripts/check-release.sh

      - name: Commit release state
        if: github.event_name == 'schedule' && steps.check.outputs.has_new == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add last_release_etcd.json

          if git diff --cached --quiet; then
            echo "No changes to commit for release state"
          else
            git commit -m "chore: update last processed etcd release to ${{ steps.check.outputs.latest_tag }}"
            git push
          fi

  build-packages:
    needs: check-release
    if: needs.check-release.outputs.has_new == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        release: ${{ fromJson(needs.check-release.outputs.new_releases) }}
        arch:
          - amd64
          - arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build deb packages in Docker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/etcd/Dockerfile
          platforms: linux/${{ matrix.arch }}
          build-args: |
            RELEASE_TAG=${{ matrix.release.tag }}
            ARCH=${{ matrix.arch }}
          secrets: |
            github_token=${{ secrets.GITHUB_TOKEN }}
          outputs: type=local,dest=./build/${{ matrix.release.tag }}-main-${{ matrix.arch }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload built packages
        uses: actions/upload-artifact@v7
        with:
          name: packages-${{ matrix.release.tag }}-main-${{ matrix.arch }}
          path: ./build/${{ matrix.release.tag }}-main-${{ matrix.arch }}/*.deb
          retention-days: 1

  create-repo:
    needs: [check-release, build-packages]
    if: needs.check-release.outputs.has_new == 'true'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-r2
      cancel-in-progress: false

    env:
      GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
      GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up packaging tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            dpkg-dev xz-utils gnupg

      - name: Install s3sync
        run: |
          curl -fsSL "https://github.com/nidor1998/s3sync/releases/latest/download/s3sync-linux-glibc2.28" \
            -o /usr/local/bin/s3sync
          chmod +x /usr/local/bin/s3sync
          s3sync --version

      - name: Import GPG key
        run: |
          [[ -z "${GPG_PRIVATE_KEY:-}" ]] && { echo "ERROR: GPG_PRIVATE_KEY not set" >&2; exit 1; }
          [[ -z "${GPG_KEY_ID:-}" ]]      && { echo "ERROR: GPG_KEY_ID not set" >&2; exit 1; }
          echo "$GPG_PRIVATE_KEY" | base64 --decode | gpg --batch --yes --import
          gpg --list-keys "$GPG_KEY_ID" > /dev/null 2>&1 || { echo "Key $GPG_KEY_ID not found after import" >&2; exit 1; }

      - name: Download all packages artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: packages-*
          path: ./downloaded-artifacts

      - name: Deploy to R2
        env:
          PROJECT_NAME: etcd
          PROJECT_SLUG: etcd
          PROJECT_UPSTREAM_URL: https://github.com/etcd-io/etcd
          PROJECT_LOGO_PATH: packages/etcd/logo.svg
          APT_SUITE_PREFIX: etcd
          APT_COMPONENT: main
          APT_INSTALL_PACKAGE: etcd
          NEW_RELEASES: ${{ needs.check-release.outputs.new_releases }}
          ALL_RELEASES: ${{ needs.check-release.outputs.all_releases }}
          LATEST_TAG: ${{ needs.check-release.outputs.latest_tag }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
          PAGES_URL: https://pkgs.bil.co.ua
          ARTIFACTS_DIR: ./downloaded-artifacts
          R2_ENDPOINT_URL: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: bash scripts/deploy-apt-repo.sh
