name: Valkey Releases

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional custom release tag to build (if empty, use latest)"
        required: false
        default: ""

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  check-release:
    runs-on: ubuntu-latest
    outputs:
      new_release: ${{ steps.check.outputs.new_release }}
      release_tag: ${{ steps.check.outputs.release_tag }}
      major_version: ${{ steps.check.outputs.major_version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch and check release
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UPSTREAM_REPO: valkey-io/valkey
          FORCE_TAG: ${{ github.event.inputs.release_tag }}
          STATE_FILE: last_release.txt
          ALWAYS_BUILD: ${{ github.event_name == 'workflow_dispatch' }}
        run: bash packages/scripts/check-release.sh

      - name: Commit release state and generated README
        if: github.event_name == 'schedule' && steps.check.outputs.new_release == 'true'
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          PAGES_URL="https://${{ github.repository_owner }}.github.io/${REPO_NAME}" \
          bash packages/scripts/generate-readme.sh \
            packages/valkey/README.md \
            packages/valkey/README.md.in \
            .github/workflows/valkey-build.yml

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add last_release.txt packages/valkey/README.md

          # Commit only when there is an actual staged change.
          if git diff --cached --quiet; then
            echo "No changes to commit for release state or generated README"
          else
            git commit -m "chore: update last processed release to ${{ steps.check.outputs.release_tag }}"
            git push
          fi

  build-packages:
    needs: check-release
    if: needs.check-release.outputs.new_release == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        os:
          - image: "debian:13"
            codename: "trixie"
          # - image: "debian:12"
          #   codename: "bookworm"
          - image: "ubuntu:24.04"
            codename: "noble"
        arch:
          - amd64
          # - arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build deb packages in Docker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/valkey/Dockerfile
          platforms: linux/${{ matrix.arch }}
          build-args: |
            DISTRO=${{ matrix.os.image }}
            RELEASE_TAG=${{ needs.check-release.outputs.release_tag }}
            MAJOR=${{ needs.check-release.outputs.major_version }}
            ARCH=${{ matrix.arch }}
            CODENAME=${{ matrix.os.codename }}
          secrets: |
            github_token=${{ secrets.GITHUB_TOKEN }}
          outputs: type=local,dest=./build/${{ matrix.os.codename }}-${{ matrix.arch }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload built packages
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ matrix.os.codename }}-${{ matrix.arch }}
          path: ./build/${{ matrix.os.codename }}-${{ matrix.arch }}/*.deb
          retention-days: 1

  create-repo:
    needs: [check-release, build-packages]
    if: needs.check-release.outputs.new_release == 'true'
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-deploy-${{ github.ref }}
      cancel-in-progress: false

    env:
      GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
      GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}

    steps:
      - name: Check if apt branch exists
        id: apt-branch
        run: |
          if git ls-remote --heads "https://github.com/${{ github.repository }}.git" apt | grep -q 'refs/heads/apt'; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout existing apt branch
        if: steps.apt-branch.outputs.exists == 'true'
        uses: actions/checkout@v4
        with:
          ref: apt
          path: repo

      - name: Initialize repo directory when apt branch is missing
        if: steps.apt-branch.outputs.exists != 'true'
        run: mkdir -p repo

      - name: Set up reprepro
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends reprepro

      - name: Import GPG key and generate public.asc
        run: |
          if [[ -z "${GPG_PRIVATE_KEY:-}" ]]; then
            echo "ERROR: GPG_PRIVATE_KEY secret is not set or is empty" >&2
            exit 1
          fi
          if [[ -z "${GPG_KEY_ID:-}" ]]; then
            echo "ERROR: GPG_KEY_ID secret is not set or is empty" >&2
            exit 1
          fi
          echo "$GPG_PRIVATE_KEY" | base64 --decode | gpg --batch --yes --import
          gpg --list-secret-keys --fingerprint

          PUBLIC_ASC="repo/public.asc"
          if ! gpg --list-keys "$GPG_KEY_ID" > /dev/null 2>&1; then
            echo "Error: Key $GPG_KEY_ID not found after import!"
            exit 1
          fi
          if [ ! -f "$PUBLIC_ASC" ]; then
            gpg --armor --export "$GPG_KEY_ID" > "$PUBLIC_ASC"
            echo "Generated public.asc for key $GPG_KEY_ID"
          else
            echo "public.asc already exists, skipping generation"
          fi

      - name: Download all packages artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: packages-*
          path: ./downloaded-artifacts

      - name: Assemble APT repository
        run: |
          MAJOR="${{ needs.check-release.outputs.major_version }}"
          REPO_DIR="repo" \
          ARTIFACTS_DIR="./downloaded-artifacts" \
          REPO_CODENAME="valkey${MAJOR}" \
          REPO_ORIGIN="Valkey APT Repository" \
          REPO_LABEL="Valkey" \
          REPO_DESCRIPTION="Valkey APT Repository" \
          GPG_KEY_ID="${GPG_KEY_ID}" \
          bash packages/scripts/assemble-apt-repo.sh

      - name: Generate index.html
        run: |
          REPO_URL="${{ github.server_url }}/${{ github.repository }}"
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          PAGES_URL="https://${{ github.repository_owner }}.github.io/${REPO_NAME}"
          RELEASE_TAG="${{ needs.check-release.outputs.release_tag }}"
          MAJOR_VERSION="${{ needs.check-release.outputs.major_version }}"
          BUILD_DATE="$(date -u '+%Y-%m-%d %H:%M UTC')"

          PROJECT_NAME="Valkey" \
          PROJECT_SLUG="valkey" \
          PROJECT_UPSTREAM_URL="https://github.com/valkey-io/valkey" \
          PROJECT_README_URL="${REPO_URL}/blob/main/packages/valkey/README.md" \
          PROJECT_LOGO_PATH="packages/valkey/logo.svg" \
          REPO_URL="${REPO_URL}" \
          PAGES_URL="${PAGES_URL}" \
          APT_BRANCH_URL="${REPO_URL}/tree/apt" \
          RELEASE_TAG="${RELEASE_TAG}" \
          MAJOR_VERSION="${MAJOR_VERSION}" \
          APT_SUITE_PREFIX="valkey" \
          APT_DEFAULT_COMPONENT="<CODENAME>" \
          APT_INSTALL_PACKAGE="valkey-server" \
          MAINTAINER_EMAIL="packages@bil.co.ua" \
          OUTPUT_PATH="./repo/valkey/index.html" \
          BUILD_DATE="${BUILD_DATE}" \
          bash packages/scripts/generate-apt-index.sh

      - name: Generate root index.html
        run: |
          REPO_URL="${{ github.server_url }}/${{ github.repository }}"
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          PAGES_URL="https://${{ github.repository_owner }}.github.io/${REPO_NAME}"
          BUILD_DATE="$(date -u '+%Y-%m-%d %H:%M UTC')"

          REPO_TITLE="APT Package Repository" \
          REPO_DESCRIPTION="Unofficial Debian/Ubuntu packages built automatically from upstream releases." \
          REPO_URL="${REPO_URL}" \
          PAGES_URL="${PAGES_URL}" \
          MAINTAINER_EMAIL="packages@bil.co.ua" \
          OUTPUT_PATH="./repo/index.html" \
          BUILD_DATE="${BUILD_DATE}" \
          bash packages/scripts/generate-root-index.sh \
            "valkey|Valkey|High-performance in-memory data store (Redis fork)"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./repo
          publish_branch: apt
          keep_files: true
          commit_message: "Update APT repo for Valkey ${{ needs.check-release.outputs.release_tag }}"
