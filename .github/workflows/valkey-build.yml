name: Valkey Releases

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional custom release tag to build (if empty, use latest)"
        required: false
        default: ""

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  check-release:
    runs-on: ubuntu-latest
    outputs:
      has_new: ${{ steps.check.outputs.has_new }}
      new_releases: ${{ steps.check.outputs.new_releases }}
      all_releases: ${{ steps.check.outputs.all_releases }}
      latest_tag: ${{ steps.check.outputs.latest_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch and check releases
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UPSTREAM_REPO: valkey-io/valkey
          FORCE_TAG: ${{ github.event.inputs.release_tag }}
          ALWAYS_BUILD: ${{ github.event_name == 'workflow_dispatch' }}
        run: bash scripts/check-release.sh

      - name: Commit release state and generated README
        if: github.event_name == 'schedule' && steps.check.outputs.has_new == 'true'
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          PAGES_URL="https://${{ github.repository_owner }}.github.io/${REPO_NAME}" \
          bash scripts/generate-readme.sh \
            packages/valkey/README.md \
            packages/valkey/README.md.in \
            .github/workflows/valkey-build.yml

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add last_release.json packages/valkey/README.md

          # Commit only when there is an actual staged change.
          if git diff --cached --quiet; then
            echo "No changes to commit for release state or generated README"
          else
            git commit -m "chore: update last processed release to ${{ steps.check.outputs.latest_tag }}"
            git push
          fi

  build-packages:
    needs: check-release
    if: needs.check-release.outputs.has_new == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        release: ${{ fromJson(needs.check-release.outputs.new_releases) }}
        os:
          - image: "debian:13"
            codename: "trixie"
          - image: "debian:12"
            codename: "bookworm"
          - image: "ubuntu:24.04"
            codename: "noble"
          - image: "ubuntu:22.04"
            codename: "jammy"
        arch:
          - amd64
          - arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build deb packages in Docker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/valkey/Dockerfile
          platforms: linux/${{ matrix.arch }}
          build-args: |
            DISTRO=${{ matrix.os.image }}
            RELEASE_TAG=${{ matrix.release.tag }}
            MAJOR=${{ matrix.release.major }}
            ARCH=${{ matrix.arch }}
            CODENAME=${{ matrix.os.codename }}
          secrets: |
            github_token=${{ secrets.GITHUB_TOKEN }}
          outputs: type=local,dest=./build/${{ matrix.release.tag }}-${{ matrix.os.codename }}-${{ matrix.arch }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload built packages
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ matrix.release.tag }}-${{ matrix.os.codename }}-${{ matrix.arch }}
          path: ./build/${{ matrix.release.tag }}-${{ matrix.os.codename }}-${{ matrix.arch }}/*.deb
          retention-days: 1

  create-repo:
    needs: [check-release, build-packages]
    if: needs.check-release.outputs.has_new == 'true'
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-deploy-${{ github.ref }}
      cancel-in-progress: false

    env:
      GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
      GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
      NEW_RELEASES: ${{ needs.check-release.outputs.new_releases }}
      ALL_RELEASES: ${{ needs.check-release.outputs.all_releases }}
      LATEST_TAG: ${{ needs.check-release.outputs.latest_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up reprepro
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends reprepro

      - name: Import GPG key and generate public.asc
        run: |
          if [[ -z "${GPG_PRIVATE_KEY:-}" ]]; then
            echo "ERROR: GPG_PRIVATE_KEY secret is not set or is empty" >&2
            exit 1
          fi
          if [[ -z "${GPG_KEY_ID:-}" ]]; then
            echo "ERROR: GPG_KEY_ID secret is not set or is empty" >&2
            exit 1
          fi
          echo "$GPG_PRIVATE_KEY" | base64 --decode | gpg --batch --yes --import
          gpg --list-secret-keys --fingerprint

          if ! gpg --list-keys "$GPG_KEY_ID" > /dev/null 2>&1; then
            echo "Error: Key $GPG_KEY_ID not found after import!"
            exit 1
          fi
          echo "GPG key $GPG_KEY_ID imported successfully (public.asc is generated inside the deploy loop)"

      - name: Download all packages artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: packages-*
          path: ./downloaded-artifacts

      - name: Assemble, generate and deploy APT repository
        env:
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
          PAGES_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          MAX_ATTEMPTS=5

          for attempt in $(seq 1 $MAX_ATTEMPTS); do
            echo "=== Attempt ${attempt}/${MAX_ATTEMPTS} ==="

            # ── Checkout the freshest apt branch state ───────────────────
            rm -rf repo
            if git ls-remote --exit-code --heads origin apt >/dev/null 2>&1; then
              git fetch origin apt
              git worktree add repo origin/apt
            else
              git worktree add --orphan -b apt repo
            fi

            # ── Ensure public.asc is present ─────────────────────────────
            if [[ ! -f repo/public.asc ]]; then
              gpg --armor --export "$GPG_KEY_ID" > repo/public.asc
              echo "Generated public.asc"
            fi

            # ── Assemble reprepro ─────────────────────────────────────────
            echo "$NEW_RELEASES" | jq -c '.[]' | while IFS= read -r release; do
              TAG="$(echo "$release"   | jq -r '.tag')"
              MAJOR="$(echo "$release" | jq -r '.major')"
              echo "--- Assembling valkey${MAJOR} for release ${TAG} ---"
              REPO_DIR="repo" \
              ARTIFACTS_DIR="./downloaded-artifacts" \
              RELEASE_TAG_FILTER="${TAG}" \
              REPO_CODENAME="valkey${MAJOR}" \
              REPO_ORIGIN="Valkey APT Repository" \
              REPO_LABEL="Valkey" \
              REPO_DESCRIPTION="Valkey APT Repository" \
              GPG_KEY_ID="${GPG_KEY_ID}" \
              bash scripts/assemble-apt-repo.sh
            done

            # ── Generate index.html ───────────────────────────────────────
            BUILD_DATE="$(date -u '+%Y-%m-%d %H:%M UTC')"

            PROJECT_NAME="Valkey" \
            PROJECT_SLUG="valkey" \
            PROJECT_UPSTREAM_URL="https://github.com/valkey-io/valkey" \
            PROJECT_README_URL="${REPO_URL}/blob/main/packages/valkey/README.md" \
            PROJECT_LOGO_PATH="packages/valkey/logo.svg" \
            REPO_URL="${REPO_URL}" \
            PAGES_URL="${PAGES_URL}" \
            APT_BRANCH_URL="${REPO_URL}/tree/apt" \
            RELEASES_JSON="${ALL_RELEASES}" \
            APT_SUITE_PREFIX="valkey" \
            APT_DEFAULT_COMPONENT="<CODENAME>" \
            APT_INSTALL_PACKAGE="valkey-server" \
            MAINTAINER_EMAIL="packages@bil.co.ua" \
            OUTPUT_PATH="./repo/valkey/index.html" \
            BUILD_DATE="${BUILD_DATE}" \
            bash scripts/generate-apt-index.sh

            # ── Generate root index.html ──────────────────────────────────
            REPO_TITLE="APT Package Repository" \
            REPO_DESCRIPTION="Unofficial Debian/Ubuntu packages built automatically from upstream releases." \
            REPO_URL="${REPO_URL}" \
            PAGES_URL="${PAGES_URL}" \
            MAINTAINER_EMAIL="packages@bil.co.ua" \
            OUTPUT_PATH="./repo/index.html" \
            BUILD_DATE="${BUILD_DATE}" \
            bash scripts/generate-root-index.sh \
              "valkey|Valkey|High-performance in-memory data store (Redis fork)"

            # ── Commit ────────────────────────────────────────────────────
            cd repo
            git add -A
            if git diff --cached --quiet; then
              echo "Nothing to commit."
              cd ..
              git worktree remove repo --force
              break
            fi
            git commit -m "Update APT repo for Valkey ${LATEST_TAG}"

            # ── Push (non-force) ──────────────────────────────────────────
            if git push origin HEAD:apt; then
              echo "✓ Deployed on attempt ${attempt}"
              cd ..
              git worktree remove repo --force
              break
            fi

            echo "Push rejected — another job pushed concurrently. Retrying..."
            cd ..
            git worktree remove repo --force

            if [[ $attempt -eq $MAX_ATTEMPTS ]]; then
              echo "ERROR: Failed to deploy after ${MAX_ATTEMPTS} attempts"
              exit 1
            fi

            sleep $((attempt * 10))
          done
