name: storcli Releases

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional: force build this tag (e.g. 007.3603.0000.0000). If empty, use latest from Broadcom API."
        required: false
        default: ""
      release_url:
        description: "Required when release_tag is set: direct ZIP URL from Broadcom."
        required: false
        default: ""

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      has_new: ${{ steps.check.outputs.has_new }}
      new_releases: ${{ steps.check.outputs.new_releases }}
      all_releases: ${{ steps.check.outputs.all_releases }}
      latest_tag: ${{ steps.check.outputs.latest_tag }}
      latest_url: ${{ steps.check.outputs.latest_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Fetch and check releases
        id: check
        env:
          BROADCOM_DOC_ID: "1232745486"
          FORCE_TAG: ${{ github.event.inputs.release_tag }}
          FORCE_URL: ${{ github.event.inputs.release_url }}
          ALWAYS_BUILD: ${{ github.event_name == 'workflow_dispatch' }}
        run: bash scripts/check-release-broadcom.sh

      - name: Commit release state and generated README
        if: github.event_name == 'schedule' && steps.check.outputs.latest_tag != ''
        run: |
          PAGES_URL="https://pkgs.bil.co.ua" \
          bash scripts/generate-readme.sh \
            packages/storcli/README.md \
            packages/storcli/README.md.in \
            .github/workflows/storcli-build.yml

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add --ignore-missing state/storcli.json packages/storcli/README.md

          if git diff --cached --quiet; then
            echo "No changes to commit for release state or generated README"
          else
            git commit -m "chore: update last processed storcli release to ${{ steps.check.outputs.latest_tag }}"
            for attempt in 1 2 3; do
              git push && break
              echo "Push failed (attempt $attempt), rebasing and retrying..."
              sleep $((attempt * 2))
              git pull --rebase
            done
          fi

  build-packages:
    needs: check-release
    if: needs.check-release.outputs.has_new == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch:
          - amd64
          - arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build deb packages in Docker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/storcli/Dockerfile
          platforms: linux/${{ matrix.arch }}
          build-args: |
            RELEASE_TAG=${{ needs.check-release.outputs.latest_tag }}
            RELEASE_URL=${{ needs.check-release.outputs.latest_url }}
            ARCH=${{ matrix.arch }}
          outputs: type=local,dest=./build/main-${{ matrix.arch }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload built packages
        uses: actions/upload-artifact@v7
        with:
          name: packages-${{ needs.check-release.outputs.latest_tag }}-main-${{ matrix.arch }}
          path: ./build/main-${{ matrix.arch }}/*.deb
          retention-days: 1

  create-repo:
    needs: [check-release, build-packages]
    if: needs.check-release.outputs.has_new == 'true'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-r2
      cancel-in-progress: false

    env:
      GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
      GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up packaging tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            dpkg-dev xz-utils gnupg

      - name: Install s3sync
        run: |
          S3SYNC_VERSION="1.56.1"
          S3SYNC_SHA256="6540376ab3566ad57b963c97274bd42381a66603f62b3e0c07c6504bddb4359d"
          curl -fsSL "https://github.com/nidor1998/s3sync/releases/download/v${S3SYNC_VERSION}/s3sync-${S3SYNC_VERSION}-linux-glibc2.28-x86_64.tar.gz" \
            -o /tmp/s3sync.tar.gz
          echo "${S3SYNC_SHA256}  /tmp/s3sync.tar.gz" | sha256sum -c -
          tar -xzf /tmp/s3sync.tar.gz -C /tmp
          sudo mv /tmp/s3sync /usr/local/bin/s3sync
          s3sync --version

      - name: Import GPG key
        run: |
          [[ -z "${GPG_PRIVATE_KEY:-}" ]] && { echo "ERROR: GPG_PRIVATE_KEY not set" >&2; exit 1; }
          [[ -z "${GPG_KEY_ID:-}" ]]      && { echo "ERROR: GPG_KEY_ID not set" >&2; exit 1; }
          echo "$GPG_PRIVATE_KEY" | base64 --decode | gpg --batch --yes --import
          gpg --list-keys "$GPG_KEY_ID" > /dev/null 2>&1 || { echo "Key $GPG_KEY_ID not found after import" >&2; exit 1; }

      - name: Download all packages artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: packages-*
          path: ./downloaded-artifacts

      - name: Deploy to R2
        env:
          PROJECT_NAME: storcli
          PROJECT_SLUG: storcli
          PROJECT_UPSTREAM_URL: https://www.broadcom.com/support/download-search?dk=StorCLI
          PROJECT_LOGO_PATH: packages/storcli/logo.svg
          APT_SUITE_PREFIX: storcli
          APT_COMPONENT: main
          APT_INSTALL_PACKAGE: storcli
          NEW_RELEASES: ${{ needs.check-release.outputs.new_releases }}
          ALL_RELEASES: ${{ needs.check-release.outputs.all_releases }}
          LATEST_TAG: ${{ needs.check-release.outputs.latest_tag }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
          PAGES_URL: https://pkgs.bil.co.ua
          ARTIFACTS_DIR: ./downloaded-artifacts
          R2_ENDPOINT_URL: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: bash scripts/deploy-apt-repo.sh
