<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="50" fill="#1B3A5C"/>

  <!-- Container box outline -->
  <rect x="18" y="30" width="64" height="42" rx="4" ry="4"
        fill="none" stroke="#FFFFFF" stroke-width="4"/>

  <!-- Top lid / flap -->
  <rect x="18" y="22" width="64" height="12" rx="4" ry="4"
        fill="#00B4E6"/>

  <!-- Vertical dividers inside the box -->
  <line x1="39" y1="34" x2="39" y2="70"
        stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
  <line x1="61" y1="34" x2="61" y2="70"
        stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>

  <!-- Horizontal mid-line -->
  <line x1="18" y1="52" x2="82" y2="52"
        stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>

  <!-- Handle on top lid -->
  <rect x="42" y="14" width="16" height="10" rx="3" ry="3"
        fill="#00B4E6" stroke="#FFFFFF" stroke-width="2"/>
</svg>
